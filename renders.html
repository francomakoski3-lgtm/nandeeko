<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NANDEEKO | Render Staging</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="stylesheet" href="styles.css?v=6">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="index.html" aria-label="NANDEEKO home">
          <img src="assets/nandeeko-logo.png?v=2" alt="NANDEEKO">
        </a>
        <div class="nav-links">
          <a href="index.html#products">Products</a>
          <a href="index.html#sourcing">Sourcing</a>
          <a href="index.html#contact">Contact</a>
        </div>
        <a class="nav-cta" href="mailto:info@nandeeko.com">info@nandeeko.com</a>
      </nav>
    </header>

    <main class="staging-page">
      <section class="section section-heading">
        <p class="eyebrow">Render staging</p>
        <div class="section-heading-row">
          <h1>Future render library</h1>
          <p>
            FBA-001 already has four live renders in the project. FBA-002 is now
            planned as a four-variant family, so the remaining slots below are
            organized around that structure.
          </p>
        </div>
      </section>

      <section class="render-grid" aria-label="Future render placeholders">
        <figure
          class="render-slot"
          data-render-src="assets/fba001-hero-render.png"
          data-render-alt="FBA-001 hero render"
        >
          <div class="render-slot-media render-placeholder">FBA-001 hero render</div>
          <figcaption>
            <strong>fba001-hero-render.png</strong>
            <span>Primary homepage hero for FBA-001.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          data-render-src="assets/fba001-desk-context-render.png"
          data-render-alt="FBA-001 desk context render"
        >
          <div class="render-slot-media render-placeholder">FBA-001 desk context render</div>
          <figcaption>
            <strong>fba001-desk-context-render.png</strong>
            <span>Editorial desk scene for FBA-001.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          data-render-src="assets/fba001-detail-render.png"
          data-render-alt="FBA-001 detail render"
        >
          <div class="render-slot-media render-placeholder">FBA-001 detail render</div>
          <figcaption>
            <strong>fba001-detail-render.png</strong>
            <span>Close-up focused on bamboo and internal details.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          data-render-src="assets/fba001-top-view-render.png"
          data-render-alt="FBA-001 top view render"
        >
          <div class="render-slot-media render-placeholder">FBA-001 top view render</div>
          <figcaption>
            <strong>fba001-top-view-render.png</strong>
            <span>Top-down render for layout and internal capacity.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          data-render-src="assets/future-renders/fba002-variants-overview.jpg"
          data-render-alt="FBA-002 variants overview render"
        >
          <div class="render-slot-media render-placeholder">FBA-002 variants overview</div>
          <figcaption>
            <strong>fba002-variants-overview.jpg</strong>
            <span>Main overview image showing FBA-002-1 through FBA-002-4 together.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          data-render-src="assets/fba002-1-render.png"
          data-render-alt="FBA-002-1 hero render"
        >
          <div class="render-slot-media render-placeholder">FBA-002-1 hero render</div>
          <figcaption>
            <strong>fba002-1-render.png</strong>
            <span>Current temporary source image for the first variant.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          data-render-src="assets/fba002-2-render.png"
          data-render-alt="FBA-002-2 hero render"
        >
          <div class="render-slot-media render-placeholder">FBA-002-2 hero render</div>
          <figcaption>
            <strong>fba002-2-render.png</strong>
            <span>Current temporary source image for the second variant.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          data-render-src="assets/fba002-3-render.png"
          data-render-alt="FBA-002-3 hero render"
        >
          <div class="render-slot-media render-placeholder">FBA-002-3 hero render</div>
          <figcaption>
            <strong>fba002-3-render.png</strong>
            <span>Current temporary source image for the third variant.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          data-render-src="assets/fba002-4-render.png"
          data-render-alt="FBA-002-4 hero render"
        >
          <div class="render-slot-media render-placeholder">FBA-002-4 hero render</div>
          <figcaption>
            <strong>fba002-4-render.png</strong>
            <span>Current temporary source image for the fourth variant.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          data-render-src="assets/future-renders/packaging-render.jpg"
          data-render-alt="Packaging render"
        >
          <div class="render-slot-media render-placeholder">Packaging render</div>
          <figcaption>
            <strong>packaging-render.jpg</strong>
            <span>Packaging and sourcing presentation image.</span>
          </figcaption>
        </figure>
      </section>
    </main>

    <script src="script.js?v=5"></script>
  </body>
</html>
