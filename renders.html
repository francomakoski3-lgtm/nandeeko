<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NANDEEKO | Render Staging</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="stylesheet" href="styles.css?v=13">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="index.html" aria-label="NANDEEKO home">
          <img src="assets/nandeeko-logo.png?v=2" alt="NANDEEKO">
        </a>
        <div class="nav-links">
          <a href="index.html#products">Products</a>
          <a href="index.html#sourcing">Supply</a>
          <a href="index.html#contact">Contact</a>
        </div>
        <a class="nav-cta" href="mailto:info@nandeeko.com">info@nandeeko.com</a>
      </nav>
    </header>

    <main class="staging-page">
      <section class="section section-heading">
        <p class="eyebrow">Render staging</p>
        <div class="section-heading-row">
          <h1>Render review</h1>
          <p>
            Current product images and concept references in one place.
          </p>
        </div>
      </section>

      <section class="render-grid" aria-label="Future render placeholders">
        <figure
          class="render-slot"
          style="--slot-ratio: 3 / 2; --slot-scale: 1.24; --slot-shift-x: -8%;"
          data-render-src="assets/fba001-hero-render.png"
          data-render-alt="Desk organizer hero render"
        >
          <div class="render-slot-media render-placeholder">Desk organizer hero</div>
          <figcaption>
            <strong>Desk organizer hero</strong>
            <span>Main homepage image.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          style="--slot-ratio: 3 / 2; --slot-scale: 1.14;"
          data-render-src="assets/fba001-desk-context-render.png"
          data-render-alt="Desk organizer desk scene"
        >
          <div class="render-slot-media render-placeholder">Desk scene</div>
          <figcaption>
            <strong>Desk scene</strong>
            <span>Workspace context image.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          style="--slot-ratio: 3 / 2; --slot-scale: 1.12;"
          data-render-src="assets/fba001-detail-render.png"
          data-render-alt="Desk organizer detail render"
        >
          <div class="render-slot-media render-placeholder">Material detail</div>
          <figcaption>
            <strong>Material detail</strong>
            <span>Close-up of finish and shape.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          style="--slot-ratio: 3 / 2; --slot-scale: 1.12;"
          data-render-src="assets/fba001-top-view-render.png"
          data-render-alt="Desk organizer top view render"
        >
          <div class="render-slot-media render-placeholder">Top view</div>
          <figcaption>
            <strong>Top view</strong>
            <span>Layout and storage view.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          style="--slot-ratio: 16 / 9; --slot-scale: 1.1;"
          data-render-src="assets/fba002-1-render.png"
          data-render-alt="Single drawer concept render"
        >
          <div class="render-slot-media render-placeholder">Single Drawer</div>
          <figcaption>
            <strong>Single Drawer</strong>
            <span>Current concept image.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          style="--slot-ratio: 16 / 9; --slot-scale: 1.1;"
          data-render-src="assets/fba002-2-render.png"
          data-render-alt="Double drawer concept render"
        >
          <div class="render-slot-media render-placeholder">Double Drawer</div>
          <figcaption>
            <strong>Double Drawer</strong>
            <span>Current concept image.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          style="--slot-ratio: 16 / 9; --slot-scale: 1.1;"
          data-render-src="assets/fba002-3-render.png"
          data-render-alt="Mesh drawer concept render"
        >
          <div class="render-slot-media render-placeholder">Mesh Drawer</div>
          <figcaption>
            <strong>Mesh Drawer</strong>
            <span>Current concept image.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          style="--slot-ratio: 16 / 9; --slot-scale: 1.1;"
          data-render-src="assets/fba002-4-render.png"
          data-render-alt="Double mesh concept render"
        >
          <div class="render-slot-media render-placeholder">Double Mesh</div>
          <figcaption>
            <strong>Double Mesh</strong>
            <span>Current concept image.</span>
          </figcaption>
        </figure>
        <figure
          class="render-slot"
          style="--slot-ratio: 16 / 9; --slot-scale: 1.08;"
          data-render-src="assets/future-renders/packaging-render.png"
          data-render-alt="Packaging render"
        >
          <div class="render-slot-media render-placeholder">Packaging render</div>
          <figcaption>
            <strong>Packaging</strong>
            <span>Temporary reference image.</span>
          </figcaption>
        </figure>
      </section>
    </main>

    <script src="script.js?v=7"></script>
  </body>
</html>
